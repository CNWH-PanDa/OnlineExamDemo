server:
  port: 3333

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_exam?characterEncoding=utf-8&serverTimezone=UTC
    username: root
    password: 123456

mybatis:
  type-aliases-package: com.panda.maven.springboot.entity
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
